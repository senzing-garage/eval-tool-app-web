<h2 class="section-title">
  Data Sources
  <mat-paginator [pageSizeOptions]="[10, 20, 50]" [pageSize]="10" showFirstLastButtons></mat-paginator>
</h2>
<div>
  <table mat-table matSort [dataSource]="datasource" class="mat-elevation-z8">
    <!--- Note that these columns can be defined in any order.
          The actual rendered columns are set as a property on the row definition" -->

    <!-- Id Column -->
    <ng-container matColumnDef="DSRC_ID">
      <th mat-header-cell *matHeaderCellDef class="header-cell"> Data Source Id</th>
      <td mat-cell *matCellDef="let element"> {{element.DSRC_ID}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="DSRC_CODE">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *matCellDef="let element"> {{element.DSRC_CODE}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
<div class="form-group form-actions">
  <button mat-stroked-button color="primary" class="btn btn-primary" type="button" (click)="openNewDataSourceDialog()"><mat-icon>add</mat-icon>New Data Source</button>
  <button mat-stroked-button color="primary" class="btn btn-primary" type="button" (click)="updateDataSourcesList()"><mat-icon>refresh</mat-icon>Refresh</button>
</div>
<!-- start spinner overlay -->
<div class="mat-background" *ngIf="loading">
  <div class="spinner">
      <div class="rect1"></div>
      <div class="rect2"></div>
      <div class="rect3"></div>
      <div class="rect4"></div>
      <div class="rect5"></div>
  </div>
</div>
<!-- end spinner overlay -->
