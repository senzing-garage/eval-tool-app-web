name: E2E Tests with Backend

on:
  push:
    branches: ["main", "3.awinters.*"]
  pull_request:
    branches: ["main", "3.awinters.*"]
  workflow_dispatch:

permissions: {}

jobs:
  e2e:
    name: E2E tests with Senzing backend
    outputs:
      status: ${{ job.status }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Start Senzing gRPC backend
        run: |
          docker run -d \
            --name senzing-grpc \
            -p 8261:8261 \
            senzing/sz-sdk-java-grpc:0.6.0 \
            --data-mart-database-uri sqlite3:///tmp/data-mart.db \
            --bind-address all \
            --allowed-origins "http://localhost:4200"

          echo "Waiting for Senzing gRPC to be ready..."
          timeout 60 bash -c 'until curl -s http://localhost:8261/health > /dev/null 2>&1; do sleep 2; done'
          echo "Senzing gRPC is ready!"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: "0"
          persist-credentials: false
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build libraries
        run: npm run build:subrepos

      - name: Build application
        run: npm run build

      - name: Start config server
        run: |
          node ./run/scripts/start-configserver -- \
            grpcConnection="http://localhost:8261" \
            datamartServerUrl="http://localhost:8261" \
            webServerUrl="http://localhost:4200" \
            webServerCspDefaultSrc="http://localhost:4200" \
            webServerStatsWithCredentials=false \
            confServerPortNumber=4201 &
          echo "Waiting for config server..."
          timeout 30 bash -c 'until curl -s http://localhost:4201 > /dev/null 2>&1; do sleep 1; done'
          echo "Config server is ready!"

      - name: Start application server
        run: npm run start &

      - name: Wait for application to be ready
        run: |
          echo "Waiting for app to be ready..."
          timeout 60 bash -c 'until curl -s http://localhost:4200 > /dev/null; do sleep 2; done'
          echo "App is ready!"

      - name: Run Playwright tests
        run: npm run e2e:ci
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:4200

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          overwrite: true

  slack-notification:
    needs: [e2e]
    if: ${{ always() && contains(fromJSON('["failure", "cancelled"]'), needs.e2e.outputs.status ) && github.ref_name == github.event.repository.default_branch }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
    uses: senzing-factory/build-resources/.github/workflows/build-failure-slack-notification.yaml@v4
    with:
      job-status: ${{ needs.e2e.outputs.status }}
